# Example: KAITO provider registration (typically created by kaito-provider controller)
# Human-facing metadata is stored in annotations; scheduling capabilities live in spec.
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: kaito
  annotations:
    airunway.ai/display-name: KAITO
    airunway.ai/description: Kubernetes AI Toolchain Operator for simplified model deployment
    airunway.ai/default-namespace: kaito-workspace
    airunway.ai/documentation-url: https://github.com/ai-runway/airunway/tree/main/docs/providers/kaito.md
    airunway.ai/documentation: https://github.com/ai-runway/airunway/tree/main/docs/providers/kaito.md
spec:
  capabilities:
    engines:
      - name: vllm
        servingModes: [aggregated]
        gpuSupport: true
      - name: llamacpp
        servingModes: [aggregated]
        gpuSupport: true
        cpuSupport: true
  selectionRules:
    - condition: "!has(spec.resources.gpu) || spec.resources.gpu.count == 0"
      priority: 100
    - condition: "spec.engine.type == 'llamacpp'"
      priority: 100
---
# Example: Dynamo provider registration (typically created by dynamo-provider controller)
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: dynamo
  annotations:
    airunway.ai/display-name: Dynamo
    airunway.ai/description: NVIDIA Dynamo for high-performance GPU inference
    airunway.ai/default-namespace: dynamo-system
    airunway.ai/documentation-url: https://github.com/ai-runway/airunway/tree/main/docs/providers/dynamo.md
    airunway.ai/documentation: https://github.com/ai-runway/airunway/tree/main/docs/providers/dynamo.md
spec:
  capabilities:
    engines:
      - name: vllm
        servingModes: [aggregated, disaggregated]
        gpuSupport: true
        gateway:
          managesInferencePool: true
          inferencePoolNamePattern: "{name}-pool"
          inferencePoolNamespace: "{namespace}"
      - name: sglang
        servingModes: [aggregated, disaggregated]
        gpuSupport: true
        gateway:
          managesInferencePool: true
          inferencePoolNamePattern: "{name}-pool"
          inferencePoolNamespace: "{namespace}"
      - name: trtllm
        servingModes: [aggregated]
        gpuSupport: true
        gateway:
          managesInferencePool: true
          inferencePoolNamePattern: "{name}-pool"
          inferencePoolNamespace: "{namespace}"
  selectionRules:
    - condition: "spec.engine.type == 'trtllm'"
      priority: 100
    - condition: "spec.engine.type == 'sglang'"
      priority: 100
    - condition: "has(spec.serving) && spec.serving.mode == 'disaggregated'"
      priority: 90
    - condition: "has(spec.resources.gpu) && spec.resources.gpu.count > 0 && spec.engine.type == 'vllm'"
      priority: 50
---
# Example: KubeRay provider registration (typically created by kuberay-provider controller)
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: kuberay
  annotations:
    airunway.ai/display-name: KubeRay
    airunway.ai/description: Ray Serve via KubeRay for distributed Ray-based model serving with vLLM
    airunway.ai/default-namespace: ray-system
    airunway.ai/documentation-url: https://github.com/ai-runway/airunway/tree/main/docs/providers/kuberay.md
    airunway.ai/documentation: https://github.com/ai-runway/airunway/tree/main/docs/providers/kuberay.md
spec:
  capabilities:
    engines:
      - name: vllm
        servingModes: [aggregated, disaggregated]
        gpuSupport: true
  selectionRules:
    - condition: "has(spec.resources.gpu) && spec.resources.gpu.count > 1 && spec.engine.type == 'vllm'"
      priority: 80
---
# Example: llm-d provider registration (typically created by llmd-provider controller)
apiVersion: airunway.ai/v1alpha1
kind: InferenceProviderConfig
metadata:
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
  name: llmd
  annotations:
    airunway.ai/display-name: llm-d
    airunway.ai/description: 'llm-d provider: deploys vLLM Deployments + Services directly. Requires GPU nodes with the NVIDIA device plugin.'
    airunway.ai/default-namespace: default
    airunway.ai/documentation-url: https://github.com/ai-runway/airunway/tree/main/docs/providers/llmd.md
    airunway.ai/documentation: https://github.com/ai-runway/airunway/tree/main/docs/providers/llmd.md
spec:
  capabilities:
    engines:
      - name: vllm
        servingModes: [aggregated, disaggregated]
        gpuSupport: true
        requiresCRD: false
  selectionRules: []
