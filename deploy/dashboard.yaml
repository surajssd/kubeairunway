apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway
  namespace: airunway-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - services/proxy
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
- apiGroups:
  - ""
  resourceNames:
  - hf-token-secret
  resources:
  - secrets
  verbs:
  - delete
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - create
  - update
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - list
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - create
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - list
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - create
  - delete
- apiGroups:
  - airunway.ai
  resources:
  - modeldeployments
  verbs:
  - get
  - list
  - create
  - delete
- apiGroups:
  - airunway.ai
  resources:
  - modeldeployments/status
  verbs:
  - get
- apiGroups:
  - airunway.ai
  resources:
  - inferenceproviderconfigs
  verbs:
  - get
  - list
  - delete
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - nvidia.com
  resources:
  - clusterpolicies
  verbs:
  - list
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  verbs:
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airunway
subjects:
- kind: ServiceAccount
  name: airunway
  namespace: airunway-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway
  namespace: airunway-system
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  selector:
    app.kubernetes.io/instance: airunway
    app.kubernetes.io/name: airunway
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/instance: airunway
    app.kubernetes.io/name: airunway
  name: airunway
  namespace: airunway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: airunway
      app.kubernetes.io/name: airunway
  template:
    metadata:
      labels:
        app.kubernetes.io/component: dashboard
        app.kubernetes.io/instance: airunway
        app.kubernetes.io/name: airunway
    spec:
      containers:
      - env:
        - name: PORT
          value: "3001"
        - name: LOG_LEVEL
          value: info
        - name: AUTH_ENABLED
          value: "true"
        - name: HELM_CACHE_HOME
          value: /tmp/helm/cache
        - name: HELM_CONFIG_HOME
          value: /tmp/helm/config
        - name: HELM_DATA_HOME
          value: /tmp/helm/data
        - name: HOME
          value: /tmp
        image: ghcr.io/kaito-project/airunway/dashboard:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        name: airunway
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: airunway
      volumes:
      - emptyDir: {}
        name: tmp
