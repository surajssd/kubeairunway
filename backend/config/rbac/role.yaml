apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airunway
  labels:
    app.kubernetes.io/name: airunway
rules:
  # Core API - Pods (listNamespacedPod, listPodForAllNamespaces; no get/watch/create/delete)
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["list"]

  # Core API - Pod logs (readNamespacedPodLog)
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]

  # Core API - Services (readNamespacedService, createNamespacedService, deleteNamespacedService)
  - apiGroups: [""]
    resources:
      - services
    verbs: ["get", "create", "delete"]

  # Core API - Service proxy (proxyServiceGet via /api/v1/.../services/.../proxy/)
  - apiGroups: [""]
    resources:
      - services/proxy
    verbs: ["get"]

  # Core API - Secrets (read, create, replace for hf-token-secret; no list/watch/patch)
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "create", "update"]

  # Core API - Secret deletion scoped to hf-token-secret only
  - apiGroups: [""]
    resources:
      - secrets
    resourceNames: ["hf-token-secret"]
    verbs: ["delete"]

  # Core API - ConfigMaps (read, create, replace; no list/watch/patch/delete)
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get", "create", "update"]

  # Events (listNamespacedEvent only; no watch)
  - apiGroups: [""]
    resources:
      - events
    verbs: ["list"]

  # Namespaces (read, list, create; no watch/delete)
  - apiGroups: [""]
    resources:
      - namespaces
    verbs: ["get", "list", "create"]

  # Authentication API - validate bearer tokens when auth is enabled
  - apiGroups: ["authentication.k8s.io"]
    resources:
      - tokenreviews
    verbs: ["create"]

  # Node info for GPU detection (listNode only; no get/watch)
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["list"]

  # Apps API - Deployments (read, list, create, delete; no update/patch/watch)
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs: ["get", "list", "create", "delete"]

  # AI Runway CRDs - ModelDeployments (get, list, create, delete; no watch/update/patch)
  - apiGroups: ["airunway.ai"]
    resources:
      - modeldeployments
    verbs: ["get", "list", "create", "delete"]

  # AI Runway CRDs - ModelDeployments /status subresource (read-only)
  - apiGroups: ["airunway.ai"]
    resources:
      - modeldeployments/status
    verbs: ["get"]

  # AI Runway CRDs - InferenceProviderConfigs (get, list, delete; no watch)
  - apiGroups: ["airunway.ai"]
    resources:
      - inferenceproviderconfigs
    verbs: ["get", "list", "delete"]

  # CRD management (readCustomResourceDefinition only; no delete)
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get"]

  # NVIDIA ClusterPolicies (listClusterCustomObject only)
  - apiGroups: ["nvidia.com"]
    resources:
      - clusterpolicies
    verbs: ["list"]

  # Gateway API - Gateways (listClusterCustomObject only)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
    verbs: ["list"]
