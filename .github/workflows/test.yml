name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Build
        run: make compile

      - name: Run backend tests with coverage
        shell: bash
        run: |
          set -o pipefail
          rc=0
          make test-coverage-backend 2>&1 | tee /tmp/backend-cov.log || rc=$?
          {
            echo "## 🧪 Backend Test Coverage"
            echo ""
            echo '```'
            tail -20 /tmp/backend-cov.log
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

      - name: Run frontend tests with coverage
        shell: bash
        run: |
          set -o pipefail
          rc=0
          make test-coverage-frontend 2>&1 | tee /tmp/frontend-cov.log || rc=$?
          {
            echo "## 🎨 Frontend Test Coverage"
            echo ""
            echo '```'
            tail -30 /tmp/frontend-cov.log
            echo '```'
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc

  web-ui-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Lint (frontend + backend)
        run: make lint

  controller-manifest-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Install kustomize
        run: cd controller && make kustomize

      - name: Generate controller manifest
        run: cd controller && bin/kustomize build config/default > /tmp/controller.yaml

      - name: Check for manifest drift
        run: |
          if ! diff -u deploy/controller.yaml /tmp/controller.yaml; then
            echo "❌ deploy/controller.yaml is out of date."
            echo "Run 'make generate-deploy-manifests' and commit the result."
            exit 1
          fi

      - name: Generate dashboard manifest
        run: controller/bin/kustomize build backend/config/default > /tmp/dashboard.yaml

      - name: Check for dashboard manifest drift
        run: |
          if ! diff -u deploy/dashboard.yaml /tmp/dashboard.yaml; then
            echo "❌ deploy/dashboard.yaml is out of date."
            echo "Run 'make generate-deploy-manifests' and commit the result."
            exit 1
          fi

  provider-go-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [dynamo, kaito, kuberay, llmd, vllm]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache-dependency-path: providers/${{ matrix.provider }}/go.sum

      # `providers/dynamo/Makefile`'s `build` target depends on
      # `verify-versions`, which regenerates `shared/types/versions.generated.ts`
      # via bun. Install bun on every matrix job (the other three providers
      # don't need it but skipping conditionally would be more brittle than
      # the ~3s install).
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: make build
        run: make -C providers/${{ matrix.provider }} build

      # Assert the shimVersion injection survives future refactors. Checks (a)
      # and (b) read the -ldflags string recorded in the binary (proves the flag
      # was *passed*); check (c) asserts the *runtime* value of ProviderVersion
      # after injection (proves the linker actually *patched* the symbol). (c) is
      # the one that catches a silent -X no-op — e.g. shimVersion becoming a
      # const, being renamed, or ProviderVersion being retargeted — which (a)/(b)
      # cannot, since the flag is still present in those cases.
      - name: Assert shimVersion injection + git-stamp default
        run: |
          set -euo pipefail
          p=${{ matrix.provider }}
          mod=$(cd "providers/$p" && go list -m)
          # (a) the un-overridden build above used the Makefile git-stamp default
          #     (hex sha, or "unknown" outside a git tree — e.g. source tarball)
          go version -m "providers/$p/bin/provider" \
            | grep -Eq -- "-X ${mod}.shimVersion=dev-([0-9a-f]+|unknown)(-dirty)?" \
            || { echo "❌ git-stamp default missing in $p"; exit 1; }
          # (b) explicit override proves the injection flag is wired
          make -C "providers/$p" build SHIM_VERSION=v9.9.9-citest
          go version -m "providers/$p/bin/provider" \
            | grep -F -- "-X ${mod}.shimVersion=v9.9.9-citest" \
            || { echo "❌ shimVersion override injection missing in $p"; exit 1; }
          # (c) prove the injection actually takes EFFECT at runtime, not just
          #     that the flag was passed. Fails on a silent -X no-op.
          EXPECT_PROVIDER_VERSION="${p}-provider:v9.9.9-citest" \
            go test -C "providers/$p" \
              -ldflags "-X ${mod}.shimVersion=v9.9.9-citest" \
              -run TestShimVersionInjection -v ./... \
            || { echo "❌ shimVersion injection had no runtime effect in $p (silent no-op)"; exit 1; }

      - name: make test
        run: make -C providers/${{ matrix.provider }} test

  controller-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache-dependency-path: controller/go.sum

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Run controller unit tests
        run: |
          cd controller
          make test
          echo "## 🎯 Controller Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=cover.out | tail -1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Test verify-versions guard
        run: make test-verify-versions

      - name: Build controller and assert ldflags injection
        # `make controller-build` delegates to controller/Makefile, which
        # injects -X .../gateway.DefaultGAIEVersion=$(GAIE_VERSION) via
        # ldflags. Read it back from the binary build info to confirm
        # the injection actually landed (commit 83c53f8).
        run: |
          set -euo pipefail
          source versions.env
          make controller-build
          if ! go version -m controller/bin/manager \
            | grep -F -- "-X github.com/ai-runway/airunway/controller/internal/gateway.DefaultGAIEVersion=${GAIE_VERSION}"; then
            echo "❌ ldflags injection of DefaultGAIEVersion=${GAIE_VERSION} did not land in controller/bin/manager"
            exit 1
          fi
          echo "✅ ldflags injection landed: DefaultGAIEVersion=${GAIE_VERSION}"

      - name: Build dynamo provider and assert ldflags injection
        # Mirrors the controller assertion above. providers/dynamo/Makefile
        # injects -X .../providers/dynamo.DynamoVersion=$(DYNAMO_VERSION).
        # Note the binary is bin/provider, not bin/manager.
        run: |
          set -euo pipefail
          source versions.env
          cd providers/dynamo && make build && cd -
          if ! go version -m providers/dynamo/bin/provider \
            | grep -F -- "-X github.com/ai-runway/airunway/providers/dynamo.DynamoVersion=${DYNAMO_VERSION}"; then
            echo "❌ ldflags injection of DynamoVersion=${DYNAMO_VERSION} did not land in providers/dynamo/bin/provider"
            exit 1
          fi
          echo "✅ ldflags injection landed: DynamoVersion=${DYNAMO_VERSION}"

  gpu-e2e-check:
    # Cluster-free gate for the GPU e2e module (test/e2e/gpu). The full suite
    # needs a GPU cluster and runs out-of-band via scripts/gpu-e2e.sh, but the
    # module must still stay formatted, vet-clean, and compilable, and its
    # cluster-free packages (sched, e2eutil) carry real unit tests. This job
    # runs all of that on a plain runner so the e2e code can't silently rot
    # between GPU runs.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.25"
          cache-dependency-path: test/e2e/gpu/go.mod

      - name: Run GPU e2e module checks
        run: make gpu-e2e-check
