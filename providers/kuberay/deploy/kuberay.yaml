apiVersion: v1
kind: Namespace
metadata:
  name: kuberay-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: kuberay-provider
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: airunway
  name: airunway-kuberay-provider
  namespace: airunway-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway-hf-secret
  namespace: kuberay-system
rules:
- apiGroups:
  - ""
  resourceNames:
  - hf-token-secret
  resources:
  - secrets
  verbs:
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airunway-kuberay-provider-role
rules:
- apiGroups:
  - airunway.ai
  resources:
  - modeldeployments
  verbs:
  - get
  - list
  - watch
  - patch
  - update
- apiGroups:
  - airunway.ai
  resources:
  - modeldeployments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - airunway.ai
  resources:
  - modeldeployments/finalizers
  verbs:
  - update
- apiGroups:
  - airunway.ai
  resources:
  - inferenceproviderconfigs
  verbs:
  - get
  - list
  - watch
  - create
  - patch
  - update
- apiGroups:
  - airunway.ai
  resources:
  - inferenceproviderconfigs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ray.io
  resources:
  - rayservices
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ray.io
  resources:
  - rayservices/status
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/name: airunway
  name: airunway-hf-secret
  namespace: kuberay-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: airunway-hf-secret
subjects:
- kind: ServiceAccount
  name: airunway
  namespace: airunway-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: airunway-kuberay-provider-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airunway-kuberay-provider-role
subjects:
- kind: ServiceAccount
  name: airunway-kuberay-provider
  namespace: airunway-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: kuberay-provider
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: airunway
    control-plane: kuberay-provider
  name: airunway-kuberay-provider
  namespace: airunway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airunway
      control-plane: kuberay-provider
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/component: kuberay-provider
        app.kubernetes.io/name: airunway
        control-plane: kuberay-provider
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /provider
        image: ghcr.io/ai-runway/airunway/kuberay-provider:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: airunway-kuberay-provider
      terminationGracePeriodSeconds: 10
